name: My First Workflow

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Java 17 설치
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Java 버전 확인
        run: java -version
      
      - name: Gradle 버전 확인
        run: ./gradlew --version

      - name: 3 step
        run: echo "${{ github.sha }} 님"